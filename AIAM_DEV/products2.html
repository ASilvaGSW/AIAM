<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTech - Soluciones de Automatización</title>
    <!-- Tailwind CSS para diseño y estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons para iconos limpios y modernos -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- Encabezado -->
    <header class="bg-slate-900 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="cpu" class="w-8 h-8 text-indigo-400"></i>
                <span class="text-xl font-bold tracking-wider">AutoTech</span>
            </div>
            <p class="text-sm text-slate-400 hidden sm:block">Sistemas de automatización inteligente</p>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-4 gap-8">
        
        <!-- Sección de Catálogo de Productos -->
        <section class="lg:col-span-3">
            <h2 class="text-2xl font-bold text-slate-900 mb-6 flex items-center gap-2">
                <i data-lucide="layout-grid" class="w-6 h-6 text-indigo-600"></i>
                Catálogo de Automatización
            </h2>
            
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
                <!-- Las tarjetas de productos se renderizan dinámicamente aquí -->
            </div>
        </section>

        <!-- Sección del Carrito de Compras -->
        <section class="lg:col-span-1">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 sticky top-24 flex flex-col max-h-[calc(100vh-120px)]">
                <div class="flex items-center justify-between border-b border-slate-100 pb-4 mb-4">
                    <h2 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                        <i data-lucide="shopping-cart" class="w-5 h-5 text-indigo-600"></i>
                        Carrito de Compras
                    </h2>
                    <span id="cart-count" class="bg-indigo-100 text-indigo-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">0</span>
                </div>

                <!-- Lista de productos agregados -->
                <div id="cart-items" class="flex-1 overflow-y-auto space-y-4 pr-1 min-h-[150px] max-h-[300px] lg:max-h-none">
                    <!-- El contenido del carrito se genera dinámicamente -->
                </div>

                <!-- Detalle y totales del carrito -->
                <div class="border-t border-slate-100 pt-4 mt-4">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-sm font-medium text-slate-600">Total acumulado:</span>
                        <span id="cart-total" class="text-xl font-extrabold text-slate-900">$0.00</span>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="clearCart()" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2 px-3 rounded-lg transition-colors flex items-center justify-center gap-1">
                            <i data-lucide="trash" class="w-3.5 h-3.5"></i> Vaciar
                        </button>
                        <button onclick="checkout()" class="text-xs bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-3 rounded-lg transition-colors flex items-center justify-center gap-1">
                            <i data-lucide="credit-card" class="w-3.5 h-3.5"></i> Simular Compra
                        </button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Pie de página -->
    <footer class="bg-slate-900 text-slate-400 py-6 mt-12 border-t border-slate-800">
        <div class="max-w-7xl mx-auto px-6 text-center text-sm">
            <p>&copy; 2026 AutoTech. Prototipo interactivo de automatización.</p>
        </div>
    </footer>

    <!-- Lógica de la Aplicación -->
    <script>
        // Catálogo de productos relacionados con automatización
        const products = [
            {
                id: 1,
                title: "Robot Aspirador Autónomo",
                description: "Navegación inteligente por LiDAR, recarga autónoma y vaciado automático de residuos.",
                price: 349.99,
                category: "Hogar",
                emoji: "🤖"
            },
            {
                id: 2,
                title: "Controlador de Riego IoT",
                description: "Ajuste automático de riego basado en pronóstico meteorológico y humedad del suelo.",
                price: 89.50,
                category: "Jardín",
                emoji: "🌱"
            },
            {
                id: 3,
                title: "Termostato Inteligente Pro",
                description: "Optimización de calefacción mediante algoritmos de aprendizaje de hábitos.",
                price: 129.99,
                category: "Hogar",
                emoji: "🌡️"
            },
            {
                id: 4,
                title: "Brazo Robótico Programable",
                description: "Kit de brazo para automatización industrial de escritorio. Compatible con ROS y Python.",
                price: 499.00,
                category: "Industria",
                emoji: "🦾"
            },
            {
                id: 5,
                title: "Alimentador Automático IoT",
                description: "Dispensación programada de raciones con control mediante aplicación móvil y voz.",
                price: 75.00,
                category: "Mascotas",
                emoji: "🐾"
            },
            {
                id: 6,
                title: "Cerradura Biométrica Autónoma",
                description: "Bloqueo por temporizador, desbloqueo facial en 3D y reportes de acceso en tiempo real.",
                price: 199.99,
                category: "Seguridad",
                emoji: "🔐"
            }
        ];

        // Estado del carrito de compras
        let cart = [];

        // Inicializar renderizado de productos en el catálogo
        function renderProducts() {
            const productGrid = document.getElementById('product-grid');
            productGrid.innerHTML = products.map(product => `
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition-shadow flex flex-col h-full">
                    <div class="h-44 bg-slate-100 flex items-center justify-center text-6xl">
                        ${product.emoji}
                    </div>
                    <div class="p-5 flex-1 flex flex-col justify-between">
                        <div>
                            <span class="text-xs font-semibold text-indigo-600 tracking-wider uppercase">${product.category}</span>
                            <h3 class="text-lg font-bold text-slate-900 mt-1">${product.title}</h3>
                            <p class="text-slate-600 text-sm mt-2 leading-relaxed">${product.description}</p>
                        </div>
                        <div class="mt-4">
                            <div class="text-2xl font-extrabold text-slate-900">$${product.price.toFixed(2)}</div>
                            <button onclick="addToCart(${product.id})" class="w-full mt-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg transition-colors flex items-center justify-center gap-2 text-sm">
                                <i data-lucide="plus-circle" class="w-4 h-4"></i> Añadir al Carrito
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // Recargar iconos de Lucide
            lucide.createIcons();
        }

        // Renderizar elementos dentro de la sección del carrito
        function renderCart() {
            const cartItemsContainer = document.getElementById('cart-items');
            const cartTotalContainer = document.getElementById('cart-total');
            const cartCountContainer = document.getElementById('cart-count');

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `
                    <div class="text-center py-8 text-slate-400">
                        <i data-lucide="shopping-bag" class="w-12 h-12 mx-auto mb-2 opacity-50"></i>
                        <p class="text-sm font-medium">El carrito está vacío</p>
                    </div>
                `;
                cartTotalContainer.innerText = "$0.00";
                cartCountContainer.innerText = "0";
                lucide.createIcons();
                return;
            }

            let total = 0;
            let totalItems = 0;

            cartItemsContainer.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                totalItems += item.quantity;

                return `
                    <div class="flex items-center justify-between border-b border-slate-100 pb-3">
                        <div class="flex-1 min-w-0 pr-2">
                            <h4 class="text-sm font-semibold text-slate-800 truncate">${item.title}</h4>
                            <p class="text-xs text-slate-500">$${item.price.toFixed(2)} c/u</p>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <button onclick="changeQuantity(${item.id}, -1)" class="p-1 rounded bg-slate-100 hover:bg-slate-200 text-slate-600 transition-colors">
                                <i data-lucide="minus" class="w-3.5 h-3.5"></i>
                            </button>
                            <span class="text-sm font-semibold w-6 text-center text-slate-800">${item.quantity}</span>
                            <button onclick="changeQuantity(${item.id}, 1)" class="p-1 rounded bg-slate-100 hover:bg-slate-200 text-slate-600 transition-colors">
                                <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                            </button>
                            <button onclick="removeFromCart(${item.id})" class="p-1 rounded text-red-500 hover:bg-red-50 transition-colors ml-1">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            cartTotalContainer.innerText = `$${total.toFixed(2)}`;
            cartCountContainer.innerText = totalItems.toString();
            lucide.createIcons();
        }

        // Agregar un producto al carrito
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            renderCart();
        }

        // Modificar cantidad (sumar o restar) de un producto del carrito
        function changeQuantity(productId, change) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                    return;
                }
            }
            renderCart();
        }

        // Eliminar producto por completo del carrito
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            renderCart();
        }

        // Limpiar todo el carrito de compras
        function clearCart() {
            cart = [];
            renderCart();
        }

        // Simular el proceso de checkout
        function checkout() {
            if (cart.length === 0) {
                alert("El carrito se encuentra vacío. Añada productos antes de proceder.");
                return;
            }
            alert("Compra procesada con éxito. Los dispositivos de automatización han sido solicitados.");
            clearCart();
        }

        // Inicialización al cargar la página
        window.onload = () => {
            renderProducts();
            renderCart();
        };
    </script>
</body>
</html>ß
